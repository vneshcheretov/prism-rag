services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: prism-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: prism-api
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      QDRANT_URL: http://qdrant:6333
      PRISM_COLLECTION: ${PRISM_COLLECTION:-prism}
      PRISM_LANGUAGE: ${PRISM_LANGUAGE:-}
      PRISM_LLM_FAST_MODEL: ${PRISM_LLM_FAST_MODEL:-gpt-4o-mini}
      PRISM_LLM_STRONG_MODEL: ${PRISM_LLM_STRONG_MODEL:-gpt-4o}
      PRISM_SONAR_DEVICE: ${PRISM_SONAR_DEVICE:-cpu}
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_data:
